# ─────────────────────────────────────────────────────────────
#  ROS_HACK Drone Simulation — Docker Compose
#
#  Usage:
#    1. Start the simulation environment (Gazebo + Bridges):
#       sudo docker compose up sim_gui      # (With GUI, requires xhost +local:docker)
#       sudo docker compose up sim_headless # (Without GUI)
#
#    2. In a NEW terminal, start the drone node:
#       sudo docker compose up auto
# ─────────────────────────────────────────────────────────────

services:

  # ── Start just the simulation node (Headless) ─────────────
  sim_headless:
    build: .
    container_name: ros_hack_sim_headless
    environment:
      - ROS_DOMAIN_ID=0
      - LIBGL_ALWAYS_SOFTWARE=1
    network_mode: host
    ipc: host
    pid: host

    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch ros_hack sim.launch.py
      "

  # ── Start just the simulation node (GUI) ──────────────────
  sim_gui:
    build: .
    container_name: ros_hack_sim_gui
    environment:
      - LIBGL_ALWAYS_SOFTWARE=1
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - MESA_GL_VERSION_OVERRIDE=3.3
      - LIBGL_DRI3_DISABLE=1
      - GZ_SIM_RENDER_ENGINE=ogre2
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
    network_mode: host
    ipc: host
    pid: host

    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch ros_hack sim.launch.py
      "

  # ── Start just the autonomous drone logic ─────────────────
  auto:
    build: .
    container_name: ros_hack_auto
    environment:
      - LIBGL_ALWAYS_SOFTWARE=1
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - MESA_GL_VERSION_OVERRIDE=3.3
      - LIBGL_DRI3_DISABLE=1
      - GZ_SIM_RENDER_ENGINE=ogre2
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
    network_mode: host
    ipc: host
    pid: host

    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch ros_hack auto.launch.py
      "

  # ── Dump topics ───────────────────────────────────────────
  debug_topics:
    build: .
    user: "1000:1000"
    network_mode: host
    volumes:
      - .:/workspace
    command: >
      bash -c "gz topic -l > /workspace/gz_topics.txt"
